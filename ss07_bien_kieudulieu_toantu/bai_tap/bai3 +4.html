<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<p id ="chuvi"></p>
<span id ="dientich"></span>
<script>
    const PI = 3.14
    let a = parseFloat(prompt("bankinh"))
    let b = 2*a*PI
    document.getElementById("chuvi").innerText = "chu vi" + "=" + b
    let c = b*b*PI
    document.getElementById("dientich").innerText = "dien tich" + "=" + c
</script>
</body>
</html>
