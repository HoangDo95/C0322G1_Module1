<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let a = parseInt(prompt("tổng thu nhập  1 năm"))
    if (a >=200){
        alert(a*0.2+" triệu phải nộp")
    }else if(a>=150){
        alert(a*0.15+" triệu phải nộp")
    }else if (a>=100){
        alert(a*0.1+" triệu phải nộp")
    }else {
        alert("không nộp")
    }
</script>
</body>
</html>
