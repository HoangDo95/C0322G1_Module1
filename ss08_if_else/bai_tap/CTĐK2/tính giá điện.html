<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let a = parseInt(prompt("Chữ điện kWh"))
    if (a<=100){
        alert(a*1500+" VND")
    }else if (a<=150){
        alert(a*1700+" VND")
    }else if (a<=200){
        alert(a*2000+" VND")
    }else {
        alert(a*2200+" VND")
    }
</script>
</body>
</html>
