<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let a= parseInt(prompt("số tiền gửi"))
    let b= a*0.3
    let c= a*0.1
    let th1= c/6
    let th2= b/12
    if (a===6){
        alert("Tổng lãi = "+c+"+"+"Gốc = "+th1)
    }else if(a===12){
        alert("Tổng lãi = "+b+"+"+"Gốc = "+th2)
    }else {
        alert("Quý khách nên gửi 6th hoặc 12th để nhận lãi")
    }
</script>
</body>
</html>
