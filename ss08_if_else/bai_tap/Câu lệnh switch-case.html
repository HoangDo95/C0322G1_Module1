<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<label for="nhapthang"></label><input id="nhapthang" type="number">
<button onclick="ketqua()">Tìm số ngày</button>
<script>
    function ketqua() {
        let month = document.getElementById("nhapthang").value;
        switch (month) {
            case "1":
            case "3":
            case "5":
            case "7":
            case "8":
            case "10":
            case "12":
                document.write("Tháng có 31 ngày");break;
            case "2":
                document.write("Tháng 2 có 28 ngày hoặc 29 ngày");break;
            case "4":
            case "6":
            case "9":
            case "11":
                document.write("Tháng có 30 ngày");break;
            default :
                document.write("Nhập lại");
        }

    }


</script>
</body>
</html>
