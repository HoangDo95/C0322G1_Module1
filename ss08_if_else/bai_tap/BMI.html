<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let weight = parseInt(prompt("cân nặng"));
    let height = parseInt(prompt("chiều cao"));
    let c = Math.pow(height,2);
    let bmi = weight / c;
    if (bmi > 30) {
        document.write('Obese')
    }else if(bmi > 25){
        document.write('Overwieght')
    }else if (bmi > 18){
        document.write('Normal')

    }else {
        document.write('Underweight')
    }

</script>
</body>
