<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    class Temperature{
        constructor(C) {
            this.C=C;
        }CtoF(){
            return this.C*9/5 +32
        }CtoK(){
            return this.C + 273.15
        }
    }let temperature = new Temperature(25);
    document.write(+temperature.CtoF()+"F"+"<br>");
    document.write(temperature.CtoK()+"K")
</script>
</body>
</html>
