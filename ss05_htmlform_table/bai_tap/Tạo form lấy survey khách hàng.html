<form>

    </tr>
    <br>

        </td>

        </tr>

        <tr>

        </tr>
        <td><input type="radio"name="Gender Identity">Other</td>
        <tr>
        <td><input type="text"></td>
    </tr>
    </table>
    <table>
        <tr>
            <td>Which of the following products have your purchased in the last 2 months. Please check all that apply.</td>
        </tr>
        <tr></tr>
        <tr></tr>
        <tr></tr>

</form>
