<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let a = ['một', '-', '2', '-', 'ba',];
    document.write("Các ký tự trong mảng : " + a + "<br>")
    for (let i = 0; i < a.length; i++) {
        if (a[i] === "-") {
            a[i] = "_";
        }
    }
    document.write("Các ký tự trong mảng được thay thế : " + a);
</script>

</body>
</html>
