<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num = parseInt(prompt("Bán kính"));

    function perimeterCircle() {
        let C = 2 * num * 3.14;
        return (C)
    }

    function acreageCircle() {
        let S = num * num * 3.14;
        return (S)
    }

    document.write("Chu vi : " + perimeterCircle() + "<br>");
    document.write("Diện tích : " + acreageCircle())

</script>
</body>
</html>
