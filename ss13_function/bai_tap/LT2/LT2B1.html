<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function square(number) {
        number = Math.pow(number, 2);
        return number
    }

    let num = parseInt(prompt("nhập số"));
    square(num);
    document.write(square(num))

</script>
</body>
</html>
