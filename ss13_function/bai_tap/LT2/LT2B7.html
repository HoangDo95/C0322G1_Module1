<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function number(a, b) {
        let c;
        c = a;
        a = b;
        b = c;
        return (a + " " + b)
    }
    let a1 = parseInt(prompt("Số a"));
    let a2 = parseInt(prompt("Số b"));
    document.write(number(a1, a2))
</script>
</body>
