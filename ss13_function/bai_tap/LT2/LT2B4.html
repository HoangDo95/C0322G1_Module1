<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let a = prompt("Nhập ký tự")
    function number() {
        if (a % a === 0) {
            return "True"
        } else {
            return "False"
        }
    }
    document.write(number())
</script>
</body>
</html>
