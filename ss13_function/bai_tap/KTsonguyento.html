<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function isPrime(number) {
        if (number < 2) {
            return false
        }
        for (let i = 2; i < number; i++) {
            if (number % i === 0) {
                return false
            }
        }
        return true
    }

    let num = parseInt(prompt("Nhập số"));
    let kt = isPrime(num);
    if (kt) {
        document.write(num + " là snt")
    } else {
        document.write(num + " không là snt")
    }


</script>
</body>
</html>
