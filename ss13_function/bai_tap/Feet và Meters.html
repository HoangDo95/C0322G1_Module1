<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function footToMeter(meter) {
        let foot = 3.279* meter
        return (foot)
    }
    let a = parseInt(prompt("Nhập m"))
    document.write(a + "m = "+footToMeter(a)+"f"+"<br>")

    function meterToFoot(foot) {
        let  meter = 0.305 * foot
        return (meter)
    }let b= parseInt(prompt("Nhập f"))
    document.write(b+ "f = "+meterToFoot(b)+"m")

</script>
</body>
</html>
