<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
<!--    . Viết chương trình cho người dùng nhập vào 1 số nguyên bất kì.-->
<!--    Hiển thị các số KHÔNG phải số nguyên tố từ 0 đến số người dùng nhập vào.-->
</head>
<body>
<script>

    let a = parseInt(prompt("nhập số"));
    for(let i=0;i<a;i++){
        for(let j=2;j<i;j++){
            if(i%j===0){
                document.write(i+"<br>");
                break
            }
        }
    }

</script>
</body>
</html>
