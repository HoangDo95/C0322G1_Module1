<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
<!--: Viết chương trình kiểm tra một ký tự trong bảng chữ cái tiếng anh là nguyên âm hay phụ âm.-->
<!--    Ký tự là bất kỳ được nhập từ bàn phím. -->
<!-- Các ký tự nguyên âm bao gồm: 'o', 'u', 'i', 'a', 'e' hoặc 'O', 'U', 'I', 'A', 'E'&ndash;&gt;-->
</head>
<body>
<script>
    let a = prompt("Nhập ký tự ")
    switch (a) {
        case "o":
        case"u":
        case"i":
        case"a":
        case"e":
        case"O":
        case"U":
        case"I":
        case"A":
        case"E":
            document.write("Là kí tự nguyên âm tiếng anh");break
        default:
            document.write("Không phải là kí tự nguyên âm tiếng anh")


}
</script>
</body>
</html>
