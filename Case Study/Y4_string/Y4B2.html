<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!--    Cho xâu kí tự. Hãy đếm số lượng kí tự khác nhau trong xâu đó-->
    <!--    Ví dụ: s = "cabca", thì kết quả differentSymbolsNaive(s) = 3.-->
    <!--    ⇨	Có 3 kí tự khác nhau là a, b và c.-->

</head>
<body>
<script>
    let text = "cabca";
    let count = 1;
    let a = text.split("");
    for (let i = 0; i < a.length; i++) {
        for(let j=i+1;j<a.length;j++){
            if(a[i]===a[j]){
                a.splice(j,1);
                count++;
                j--;
            }
        }document.write(a[i]+':'+ count+'<br>');
        count=1;
    }
</script>
</body>
</html>
