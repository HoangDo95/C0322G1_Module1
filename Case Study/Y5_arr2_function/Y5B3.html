<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
<!--    Viết hàm tìm giá trị lớn nhất, nhỏ nhất trong mảng 2 chiều-->
</head>
<body>
<script>
    let a =[[1,2,3],[4,5,6]];
    let max = a[0][0];
    let min = a[0][0];
    for(let i=0;i<a.length;i++){
        for(let j = 0;j<a[i].length;j++){
            if(a[i][j]>max){
                max = a[i][j];
            }if(a[i][j]<min){
                min = a[i][j];
            }
        }
    }document.write(max + "<br>")
    document.write(min)
</script>
</body>
</html>
